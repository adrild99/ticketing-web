<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ticketing - Catálogo</title>
    <link rel="stylesheet" th:href="@{/style.css}">

</head>
<body>

<header>
    <h1>🎟 Ticketing</h1>
</header>

<div class="catalogo">
    <div class="card" th:each="evento : ${catalogo}">
        <div class="tipo" th:text="${evento.categoria}"></div>
        <h2 th:text="${evento.nombre}"></h2>
        <p class="lugar" th:text="${evento.lugar}"></p>

        <div th:each="sesion : ${evento.sesiones}" class="sesion">
            <span th:text="${sesion.fechaHora}"></span>
            <span class="aforo" th:text="${sesion.aforoDisponible} + ' entradas'"></span>
        </div>
    </div>
</div>

</body>
</html>
